<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unlock Pro - AI Dev Flow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script>
</head>
<body class="bg-slate-950 text-white flex items-center justify-center min-h-screen p-6">
    <input type="hidden" id="pk-val" value="{{ paystack_key }}">
    <input type="hidden" id="em-val" value="{{ session.get('user_email', 'guest@example.com') }}">

    <div class="max-w-md w-full p-10 bg-slate-900 border border-slate-800 rounded-[3rem] shadow-2xl text-center">
        <h2 class="text-3xl font-black mb-2 tracking-tighter">Unlock Pro</h2>
        <p class="text-slate-500 text-sm mb-10">Get lifetime access to project history and unlimited blueprints.</p>

        <div class="bg-indigo-600/10 border border-indigo-500/20 py-10 rounded-[2rem] mb-10">
            <span class="text-6xl font-black">₦200</span>
            <div class="text-[10px] uppercase font-bold text-indigo-400 tracking-[0.2em] mt-3">One-Time Fee</div>
        </div>

        <button onclick="initPayment()" class="w-full bg-white text-black font-black py-5 rounded-2xl hover:bg-slate-200 transition-all shadow-xl active:scale-95 text-lg">
            Pay Now Securely
        </button>
    </div>

    <script>
        function initPayment() {
            const key = document.getElementById('pk-val').value;
            const email = document.getElementById('em-val').value;

            if(!key || key === "None") return alert("Error: API Key missing in Vercel settings.");

            let handler = PaystackPop.setup({
                key: key,
                email: email,
                amount: 20000, // 200 Naira
                currency: "NGN",
                callback: function(response) {
                    window.location.href = "/payment_success?reference=" + response.reference;
                }
            });
            handler.openIframe();
        }
    </script>
</body>
</html>
