<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - AI Dev Flow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col font-sans">

    <div id="app-config" 
         data-is-paid="{{ is_paid }}" 
         data-email="{{ session.get('user_email', 'guest@example.com') }}">
    </div>

    <nav class="border-b border-slate-900 px-8 py-4 flex justify-between items-center bg-slate-950/50 backdrop-blur-md sticky top-0 z-50">
        <div class="font-black tracking-tighter text-xl">AI DEV FLOW</div>
        <div>
            {% if not is_paid %}
            <a href="/unlock" class="text-xs font-bold bg-indigo-600 px-6 py-2 rounded-full hover:bg-indigo-500 transition shadow-lg">Upgrade to Pro</a>
            {% else %}
            <span class="text-xs text-indigo-400 font-bold border border-indigo-500/20 px-3 py-1 rounded-full uppercase tracking-widest">Pro Member</span>
            {% endif %}
        </div>
    </nav>

    <main class="flex-1 p-6 md:p-12 max-w-5xl mx-auto w-full space-y-8">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-2">
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Tech Stack</label>
                <select id="techStack" class="w-full bg-slate-900 border border-slate-800 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                    <option value="Flask">Flask / Python</option>
                    <option value="NodeJS">Node.js / Express</option>
                    <option value="NextJS">Next.js / React</option>
                    <option value="Django">Django / Python</option>
                </select>
            </div>
            <div class="space-y-2">
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Architectural Goal</label>
                <select id="actionType" class="w-full bg-slate-900 border border-slate-800 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                    <option value="Scaffold">Initial Project Scaffold</option>
                    <option value="Refactor">Code Refactor</option>
                    <option value="Audit">Security Audit</option>
                </select>
            </div>
        </div>

        <textarea id="userInput" class="w-full h-48 bg-slate-900 border border-slate-800 rounded-3xl p-6 text-white outline-none focus:ring-2 focus:ring-indigo-500 shadow-inner" placeholder="Describe your project requirements..."></textarea>
        
        <button id="generateBtn" class="w-full bg-indigo-600 py-5 rounded-2xl font-black text-lg hover:bg-indigo-500 transition-all active:scale-[0.98]">
            Generate Professional Architecture
        </button>

        <div id="outputArea" class="hidden space-y-4 pt-10 pb-20">
            <div class="flex justify-between items-center">
                <span class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest">Blueprint Result</span>
                <button id="copyBtn" class="text-xs text-slate-500 hover:text-white transition">Copy Result</button>
            </div>
            <pre id="resultBox" class="p-8 bg-slate-900 border border-slate-800 rounded-3xl text-sm font-mono whitespace-pre-wrap leading-relaxed overflow-x-auto text-indigo-50 shadow-2xl"></pre>
        </div>
    </main>

    <script src="/static/js/main.js"></script>
</body>
</html>
